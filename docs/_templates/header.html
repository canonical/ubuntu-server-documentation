<header id="header" class="p-navigation">

  <!-- Google Tag Manager -->
  <script>
    (function(w, d, s, l, i) {
      w[l] = w[l] || [];
      w[l].push({
        'gtm.start': new Date().getTime(),
        event: 'gtm.js'
      });
      var f = d.getElementsByTagName(s)[0];
      var j = d.createElement(s);
      var dl = '';
      if (l != 'dataLayer') {
          dl = '&l=' + l;
      }
      j.async = true;
      j.src = 'https://www.googletagmanager.com/gtm.js?id=' + i + dl;
      f.parentNode.insertBefore(j, f);
    })(window, document, 'script', 'dataLayer', 'GTM-KNX3CJC');
  </script>

  <div class="p-navigation__nav" role="menubar">

    <ul class="p-navigation__links" role="menu">

      <li>
        {% if product_page %}
        <a class="p-logo" href="https://{{ product_page }}" aria-current="page">
          <img src="{{ pathto(product_tag,1) }}" alt="Logo" class="p-logo-image">
          <div class="p-logo-text p-heading--4">{{ project }}
          </div>
        </a>
        {% else %}
        <div class="p-logo">
          <img src="{{ pathto(product_tag,1) }}" alt="Logo" class="p-logo-image">
          <div class="p-logo-text p-heading--4">{{ project }}
          </div>
        </div>
        {% endif %}
      </li>

      <li class="nav-ubuntu-com">
        {% if product_page %}
        <a href="https://{{ product_page }}" class="p-navigation__link">{{ product_page }}</a>
        {% endif %}
      </li>

      <li class="nav-dropdown">
        <a href="#" class="p-navigation__link nav-more-links"
           id="more-resources-toggle"
           aria-haspopup="true"
           aria-expanded="false">
          Ubuntu documentation
        </a>
        <ul class="more-links-dropdown" aria-labelledby="more-resources-toggle">
          {% for item in ubuntu_docs %}
          <li>
            <a href="{{ item.url }}" class="p-navigation__sub-link p-dropdown__link">{{ item.title }}</a>
          </li>
          {% endfor %}
        </ul>
      </li>

    </ul>
  </div>
</header>
